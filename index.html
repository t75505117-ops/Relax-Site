<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TimeToTravel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #05010a;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #0b0014;
    box-shadow: 0 0 20px #ff00ff;
}

/* BUTTONS */
button {
    background: transparent;
    border: 1px solid #ff00ff;
    color: white;
    padding: 6px 10px;
    margin-left: 5px;
    cursor: pointer;
}

button:hover {
    box-shadow: 0 0 10px #00ffff;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: #120022;
    border: 1px solid #ff00ff;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #ff00ff;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
}

.modal-content {
    background: #120022;
    width: 80%;
    max-width: 600px;
    margin: 5% auto;
    padding: 20px;
    border: 1px solid #00ffff;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    margin-top: 5px;
    padding: 6px;
    background: #1a002f;
    color: white;
    border: 1px solid #ff00ff;
}
</style>
</head>

<body>

<header>
    <div>🌍 TimeToTravel</div>

    <div>
        <button onclick="setLang('ru')">RU</button>
        <button onclick="setLang('kg')">KG</button>
        <button onclick="setLang('en')">EN</button>
    </div>
</header>

<div class="container" id="list"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h2 id="title"></h2>
        <img id="img" style="width:100%; border-radius:10px;">
        <p id="desc"></p>

        <h3>⭐ Rating (1-5)</h3>
        <input id="rating" type="number" min="1" max="5">

        <h3>💬 Review</h3>
        <textarea id="review"></textarea>

        <button onclick="saveReview()">Save</button>
        <button onclick="closeModal()">Close</button>

        <div id="reviews"></div>
    </div>
</div>

<script>
let lang = "ru";
let current = null;

let data = [
    {
        id: 1,
        img: "https://picsum.photos/400/250?1",
        ru: "Горы Ала-Тоо",
        kg: "Ала-Тоо тоолору",
        en: "Ala-Too Mountains",
        desc: {
            ru: "Красивые горы Кыргызстана",
            kg: "Кыргызстандын кооз тоолору",
            en: "Beautiful mountains of Kyrgyzstan"
        }
    },
    {
        id: 2,
        img: "https://picsum.photos/400/250?2",
        ru: "Иссык-Куль",
        kg: "Ысык-Көл",
        en: "Issyk-Kul Lake",
        desc: {
            ru: "Горное озеро",
            kg: "Тоо көлү",
            en: "Mountain lake"
        }
    }
];

function render(){
    let list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(p=>{
        list.innerHTML += `
        <div class="card" onclick="openPlace(${p.id})">
            <img src="${p.img}">
            <h3 style="padding:10px">${p[lang]}</h3>
        </div>`;
    });
}

function setLang(l){
    lang = l;
    render();
}

function openPlace(id){
    current = data.find(p=>p.id===id);

    document.getElementById("modal").style.display = "block";
    document.getElementById("title").innerText = current[lang];
    document.getElementById("img").src = current.img;
    document.getElementById("desc").innerText = current.desc[lang];

    loadReviews();
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

function saveReview(){
    let r = document.getElementById("rating").value;
    let t = document.getElementById("review").value;

    if(!r || !t) return;

    let key = "ttt_" + current.id;
    let arr = JSON.parse(localStorage.getItem(key) || "[]");

    arr.push({rating:r, text:t});
    localStorage.setItem(key, JSON.stringify(arr));

    loadReviews();
}

function loadReviews(){
    let key = "ttt_" + current.id;
    let arr = JSON.parse(localStorage.getItem(key) || "[]");

    let box = document.getElementById("reviews");
    box.innerHTML = "<h3>Reviews</h3>";

    arr.forEach(r=>{
        box.innerHTML += `<p>⭐ ${r.rating} - ${r.text}</p>`;
    });
}

render();
</script>

</body>
</html>
